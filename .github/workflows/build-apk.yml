name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new GitHub Release with APK'
        type: boolean
        default: true
      version_bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Bump version
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update versionName in build.gradle
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.version }}\"/" app/build.gradle
          # Also bump versionCode
          CURRENT_CODE=$(grep -oP 'versionCode \K\d+' app/build.gradle)
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" app/build.gradle
          echo "Updated to version ${{ steps.version.outputs.version }} (code: $NEW_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/TGProxy-${VERSION}-debug.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "app/build/outputs/apk/release/TGProxy-${VERSION}-release.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TGProxy-debug
          path: app/build/outputs/apk/debug/TGProxy-*-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TGProxy-release
          path: app/build/outputs/apk/release/TGProxy-*-release.apk

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create tag and release
        if: >-
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create and push tag (only for workflow_dispatch)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Create release with gh CLI
          gh release create "$TAG" \
            "app/build/outputs/apk/debug/TGProxy-${VERSION}-debug.apk" \
            "app/build/outputs/apk/release/TGProxy-${VERSION}-release.apk" \
            --title "TG Proxy $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
