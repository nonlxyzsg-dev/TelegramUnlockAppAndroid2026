name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/TGProxy-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/TGProxy-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TGProxy-debug
          path: app/build/outputs/apk/debug/TGProxy-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TGProxy-release
          path: app/build/outputs/apk/release/TGProxy-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/TGProxy-debug.apk
            app/build/outputs/apk/release/TGProxy-release.apk
          generate_release_notes: true
